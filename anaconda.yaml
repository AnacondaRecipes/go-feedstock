anaconda_config_version: 1
upstream_sources:
  - webpage:
      url: https://go.dev/dl/go{}.src.tar.gz
      regex: (?:.*)go(.*)\.src\.tar\.gz
    packages:
      - go
      - go-cgo
      - go-nocgo
      - go_linux-32
      - go_linux-64
      - go_linux-ppc64le
      - go_osx-64
      - go_win-32
      - go_win-64
